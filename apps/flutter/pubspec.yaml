name: ontask
description: "OnTask — offline-first task management for field teams."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.3.0
  riverpod_annotation: ^4.0.0

  # Navigation
  go_router: ^15.1.2

  # Networking
  dio: ^5.7.0

  # Local storage
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.4
  path: ^1.9.1

  # Domain models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Preferences / non-sensitive settings only
  shared_preferences: ^2.3.3

  # Authentication
  sign_in_with_apple: ^6.1.2
  google_sign_in: ^6.2.2

  # Secure token storage (iOS Keychain / macOS Keychain)
  flutter_secure_storage: ^9.2.2

  # Skeleton loading animations
  shimmer: ^3.0.0

  # Desktop window management (macOS minimum size enforcement)
  window_manager: ^0.3.9

  # Network connectivity status — used by SyncManager to trigger offline queue
  # processing on reconnect (FR94).
  connectivity_plus: ^6.1.4

  # Data export delivery — presents system share sheet / Files save on iOS and macOS (FR81).
  share_plus: ^10.0.0

  # TOTP QR code rendering — displays otpauth:// URI as scannable QR in 2FA setup (FR92).
  qr_flutter: ^4.1.0

  # Payment setup — opens ontaskhq.com/setup in Safari (not in-app WebView) for PCI SAQ A.
  url_launcher: ^6.3.1

  # Observability & Error Tracking (ARCH-30, ARCH-31)
  # sentry_flutter: Sentry-compatible SDK for GlitchTip DSN integration; captures unhandled Dart + Flutter errors.
  sentry_flutter: ^8.14.0
  # posthog_flutter: PostHog Flutter SDK for in-app event tracking and feature flag evaluation.
  posthog_flutter: ^4.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Mocking
  mocktail: ^1.0.4

  # Code generation
  # NOTE: build_runner is a LOCAL-ONLY dev tool.
  # It does NOT run in CI. Generated *.g.dart and *.freezed.dart files
  # are committed to the repo so CI can run flutter test without needing
  # build_runner installed.
  build_runner: ^2.4.13
  riverpod_generator: ^4.0.0
  drift_dev: ^2.22.1
  freezed: ^3.0.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/playfair_display/
  fonts:
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/playfair_display/PlayfairDisplay-Regular.ttf
        - asset: assets/fonts/playfair_display/PlayfairDisplay-Italic.ttf
          style: italic
