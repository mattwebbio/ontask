<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Setup — OnTask</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Stripe.js MUST be loaded from Stripe's CDN (PCI DSS SAQ A requirement). Never self-host. -->
  <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
  <div class="container">
    <div class="card" id="form-card">
      <h1 class="title">Set up payment method</h1>
      <p class="subtitle">
        Add a card to enable commitment stakes. You won't be charged unless you miss a staked task.
      </p>

      <div id="loading-state" class="state">
        <div class="spinner"></div>
        <p>Loading secure payment form…</p>
      </div>

      <div id="error-state" class="state hidden">
        <p class="error-message" id="error-message">Something went wrong. Please return to the app and try again.</p>
      </div>

      <div id="payment-form" class="hidden">
        <div id="card-element"></div>
        <div id="card-errors" class="field-error" role="alert"></div>
        <button id="submit-btn" class="btn-primary" type="button">Save payment method</button>
      </div>
    </div>
  </div>

  <script>
    // ── Constants ──────────────────────────────────────────────────────────────
    // Stripe publishable key — safe to include in client-side code by design.
    // Replace with actual key before deploying to production.
    const STRIPE_PUBLISHABLE_KEY = 'pk_live_REPLACE_WITH_ACTUAL_KEY';
    const API_BASE_URL = 'https://api.ontaskhq.com';

    // ── Helpers ────────────────────────────────────────────────────────────────
    function getQueryParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function showState(stateId) {
      document.getElementById('loading-state').classList.add('hidden');
      document.getElementById('error-state').classList.add('hidden');
      document.getElementById('payment-form').classList.add('hidden');
      document.getElementById(stateId).classList.remove('hidden');
    }

    function showError(message) {
      document.getElementById('error-message').textContent =
        message || 'Something went wrong. Please return to the app and try again.';
      showState('error-state');
    }

    // ── Main ───────────────────────────────────────────────────────────────────
    (async function init() {
      const sessionToken = getQueryParam('sessionToken');

      if (!sessionToken) {
        showError('Invalid session. Please return to the app and try again.');
        return;
      }

      // Fetch the SetupIntent client_secret from the API using the session token.
      // The sessionToken is OnTask's own short-lived token (5-min TTL) — not Stripe's.
      let clientSecret;
      try {
        const response = await fetch(
          `${API_BASE_URL}/v1/payment-method/setup-intent-client-secret?sessionToken=${encodeURIComponent(sessionToken)}`,
          { method: 'GET', headers: { 'Content-Type': 'application/json' } }
        );
        if (!response.ok) {
          if (response.status === 404) {
            showError('This session has expired. Please return to the app and try again.');
          } else {
            showError('Could not load the payment form. Please return to the app and try again.');
          }
          return;
        }
        const json = await response.json();
        clientSecret = json.data.clientSecret;
      } catch (_) {
        showError('Network error. Please check your connection and try again.');
        return;
      }

      // Initialise Stripe Elements.
      const stripe = Stripe(STRIPE_PUBLISHABLE_KEY);
      const elements = stripe.elements();

      const cardElement = elements.create('card', {
        style: {
          base: {
            color: '#f2f2f7',
            fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif',
            fontSize: '16px',
            '::placeholder': { color: '#8e8e93' },
          },
          invalid: { color: '#ff453a' },
        },
      });

      showState('payment-form');
      cardElement.mount('#card-element');

      // Live card validation errors.
      cardElement.on('change', (event) => {
        const errorEl = document.getElementById('card-errors');
        errorEl.textContent = event.error ? event.error.message : '';
      });

      // Submit handler.
      document.getElementById('submit-btn').addEventListener('click', async () => {
        const submitBtn = document.getElementById('submit-btn');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Saving…';

        const { setupIntent, error } = await stripe.confirmCardSetup(clientSecret, {
          payment_method: { card: cardElement },
        });

        if (error) {
          document.getElementById('card-errors').textContent = error.message;
          submitBtn.disabled = false;
          submitBtn.textContent = 'Save payment method';
          return;
        }

        // Success — redirect back to the app via Universal Link.
        // The setup_intent_client_secret goes in the URL FRAGMENT (hash) for security:
        // fragments are NOT sent to servers and are NOT logged.
        const returnUrl =
          `https://ontaskhq.com/payment-setup-complete` +
          `?sessionToken=${encodeURIComponent(sessionToken)}` +
          `#setup_intent_client_secret=${encodeURIComponent(setupIntent.client_secret)}`;

        window.location.href = returnUrl;
      });
    })();
  </script>
</body>
</html>
