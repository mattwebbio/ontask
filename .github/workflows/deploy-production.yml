# Deploy to Production — implemented in Story 1.2
name: Deploy Production

on:
  push:
    tags:
      - 'v*'

jobs:
  placeholder:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Production deploy implemented in Story 1.2"

  deploy-marketing:
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4
      - name: Deploy marketing site to Cloudflare Pages (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/marketing --project-name ontask-marketing
